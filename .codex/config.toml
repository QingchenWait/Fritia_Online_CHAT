approval_policy = "on-request"
default_permissions = "fritia-local-dev"

[windows]
sandbox = "elevated"

[permissions.fritia-local-dev]
description = "Edit fritia_online_next_chat, read sibling reference projects under d:\\models\\vibe_coding"
extends = ":workspace"

[permissions.fritia-local-dev.filesystem]
":minimal" = "read"

# 允许 Codex 读取 PowerShell 7 可执行文件所在目录，避免 sandbox 下找不到 pwsh.exe
"C:\\Program Files\\WindowsApps\\Microsoft.PowerShell_7.6.3.0_x64__8wekyb3d8bbwe" = "read"

# 允许读取 d:\models\vibe_coding 下所有目录，包括旧项目、参考项目、兄弟项目
# 这里是 read，不是 write，因此 Codex 不应能修改这些参考目录
"D:\\models\\vibe_coding" = "read"

# 如果你担心读取敏感文件，可以继续加 deny
"D:\\models\\vibe_coding\\**\\.env" = "deny"
"D:\\models\\vibe_coding\\**\\.env.*" = "deny"

[permissions.fritia-local-dev.filesystem.":workspace_roots"]
"." = "write"
"**/*.env" = "deny"
"**/.env.*" = "deny"

[permissions.fritia-local-dev.network]
enabled = false